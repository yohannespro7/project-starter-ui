<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--<meta name="viewport" content="width=device-width, initial-scale=1.0"/>-->
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
      .ui-container {
        background: white;
        box-shadow: 3px 3px 10px #ccc;
        border-radius: 20px;
        padding: 15px;
        width: 70%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin: 25px auto;
        background-image: linear-gradient(rgba(0,0,0,0.6)), url('img/vector-bg.jpg')
      }
      .ui-container_image {
        display: block;
        margin: 0 auto;
      }
      .ui-container_button {
        background-color: white;
        box-shadow: 3px 3px 10px #ccc;
        padding: 10px 20px;
        border-radius: 20px;
        border: 1px solid #aaa;
      }
      .ui-container_text {
        text-align: center;
        font-size: 13px;
        margin: 0 auto;
      }
      .ui-container_title {
        color: dodgerblue;
        text-align: center;
        margin: 0;
      }
      .toggle-button {
        border: 1px solid #aaa;
        padding: 10px 15px;
        border-radius: 15px;
      }
    </style>
</head>
<body>
  <button class="toggle-button" id="toggle-button">Turn Off</button>
  <div class="ui-container">
    <img 
      class="ui-container_image" 
      src="img/avatar.png" 
      alt="avatar.png"
      width='150px'
      height='150px'/>
    <h3 class="ui-container_title">I'm web front-end developer</h3>
    
    <div class="wrapper">
    <div class="search-card">
      <input type="text" placeholder="Search here">
      <button>Add</button>
    </div>
  </div>
        
    <p class='ui-container_text'>
      quisque expetenda postulant<br>
      dicunt habitasse<br>
      nostrum meaeu sociosqu maximus<br>
    </p>
  </div>
  
  <div class="navbar">
      <a href="#" class="active">Home</a>
      <a href="#">Contact</a>
      
      <div class="right-group">
        <a href="#">About</a>
        <a href="#">News</a>
      </div>
    </div>
    

<ul>
  <li>
    <div class="panel-wrapper">
      <div class="avatar-image-wrapper">
        <img
          class="avatar-1"
          src="img/avatar.png"
          width="150"
          height="150"
          alt="avatar" />
      </div>
      <div class="description-wrapper">
        <h2 class="occupation-text">I'm Web designer</h2>
        <div class="desc-wrapper">
          <p>
            ፈጣን፣ ደህንነቱ የተጠበቀ እና ተጠቃሚን ያማከለ ድር ጣቢያዎችን እሰራለሁ። ትናንሽ የግል ገጾችም ሆኑ ትላልቅ
            የንግድ አፕሊኬሽኖች ላይ ልምድ አለኝ።
          </p>
        </div>
        <div class="contact-wrapper">
          <div class="contact-container">
            <button class="contact-text">Contact</button>
            <button class="contact-arrow">
              <?xml version="1.0" encoding="utf-8"?>
              <!-- Uploaded to: SVG Repo, www.svgrepo.com, Generator: SVG Repo Mixer Tools -->
              <svg
                width="40px"
                height="40px"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M6 12H18M18 12L13 7M18 12L13 17"
                  stroke="#000000"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </li>
</ul>
    
  <!-- Web component -->
  
  
  <script src="script.js"></script>
  <script>
    const toggleBtn = document.getElementById('toggle-button');
    toggleBtn.onclick = function(){
      if (toggleBtn.innerText === 'Turn On'){
        toggleBtn.innerText = 'Turn Off';
      }else {
        toggleBtn.innerText = 'Turn On';
      }
    }
  </script>
</body>
</html>
